name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Detect prerelease
      id: tag
      run: |
        TAG="${{ github.ref_name }}"
        if [[ "$TAG" =~ -(alpha|beta|rc)\. ]]; then
          echo "prerelease=true" >> "$GITHUB_OUTPUT"
        else
          echo "prerelease=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Build release notes
      id: notes
      run: |
        TAG="${{ github.ref_name }}"

        # Last stable tag: x.y.z only, excluding current tag
        LAST_STABLE=$(git tag --sort=-version:refname \
          | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
          | grep -v "^${TAG}$" \
          | head -1)

        RANGE="${LAST_STABLE:+${LAST_STABLE}..}HEAD"
        NOTES=$(git log "$RANGE" --pretty=format:"- %s" --no-merges)

        {
          echo "content<<EOF"
          echo "$NOTES"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Build release zip
      run: |
        cd custom_components/odio_remote
        zip -r "$GITHUB_WORKSPACE/odio_remote.zip" . \
          -x "tests/*" "*/__pycache__/*" "*.pyc"

    - name: Create GitHub release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.ref_name }}
        prerelease: ${{ steps.tag.outputs.prerelease }}
        body: ${{ steps.notes.outputs.content }}
        files: odio_remote.zip
